<script>
document.addEventListener("DOMContentLoaded", () => {

  /* =========================
     🎬 VIDEO SECTION
  ========================== */
  const videoFilesOriginal = [
    "dream-1.mp4",
    "dream-2.mp4",
    "dream-3.mp4",
    "dream-4-fixed.mp4",
    "dream-5.mp4"
  ];

  let videoFiles = [...videoFilesOriginal];
  let currentIndex = 0;

  const videoElement = document.getElementById("videoPlayer");
  const dreamImage = document.getElementById("dreamImage");
  const dreamContainer = document.getElementById("dreamContainer");
  const spotlight = document.getElementById("spotlightOverlay");

  /* =========================
     🎨 PNG SEQUENCE SETUP
  ========================== */

  const canvas = document.getElementById("glowCanvas");

  if (!canvas) {
    console.error("Canvas not found");
    return;
  }

  const ctx = canvas.getContext("2d");

  const totalFrames = 48;
  const frameRate = 30;

  let frames = [];
  let currentFrame = 0;
  let playing = false;

  const sequencePath = "title-seq/";

  // preload frames
  for (let i = 0; i < totalFrames; i++) {
    const img = new Image();
    img.src = `${sequencePath}dream-glow${String(i).padStart(2, '0')}.png`;
    img.onerror = () => console.warn("Missing:", img.src);
    frames.push(img);
  }

  function drawFrame(index) {
    const img = frames[index];
    if (!img || !img.complete) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  }

  function playSequence() {
    if (playing) return;

    playing = true;
    currentFrame = 0;

    let lastTime = 0;

    function animate(time) {
      if (!playing) return;

      if (time - lastTime > 1000 / frameRate) {
        drawFrame(currentFrame);
        currentFrame++;
        lastTime = time;
      }

      if (currentFrame < totalFrames) {
        requestAnimationFrame(animate);
      } else {
        playing = false;
      }
    }

    requestAnimationFrame(animate);
  }

  /* =========================
     🖱️ INTERACTIONS
  ========================== */

  document.addEventListener("mousemove", (e) => {
    spotlight.style.setProperty("--x", e.clientX + "px");
    spotlight.style.setProperty("--y", e.clientY + "px");
  });

  dreamImage.addEventListener("mouseenter", () => {
    playSequence();
    dreamContainer.style.transform = "scale(0.95)";
    spotlight.style.background = "rgba(0,0,0,0)";
  });

  dreamImage.addEventListener("mouseleave", () => {
    playing = false;
    dreamContainer.style.transform = "scale(1)";
    spotlight.style.background = `
      radial-gradient(
        circle at var(--x, 50%) var(--y, 50%),
        rgba(0,0,0,0) 50px,
        rgba(0,0,0,0.8) 150px
      )
    `;
  });

  /* =========================
     🎲 VIDEO PLAYBACK
  ========================== */

  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  shuffleArray(videoFiles);

  function playCurrentVideo() {
    if (currentIndex >= videoFiles.length) {
      shuffleArray(videoFiles);
      currentIndex = 0;
    }

    const videoPath = "dream-animatic-shots/" + videoFiles[currentIndex];
    videoElement.src = videoPath;
    videoElement.load();
    videoElement.play().catch(err => console.error(err));
  }

  dreamImage.addEventListener("click", () => {
    dreamContainer.classList.add("hidden");
    videoElement.classList.remove("hidden");
    spotlight.classList.add("hidden");

    playCurrentVideo();

    videoElement.onended = () => {
      currentIndex++;
      playCurrentVideo();
    };

    videoElement.onerror = () => {
      currentIndex++;
      playCurrentVideo();
    };
  });

});
</script>
