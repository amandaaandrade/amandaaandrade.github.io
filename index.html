<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dream</title>
  <link rel="icon" href="data:image/x-icon,;">

  <style>
    body {
      margin: 0;
      background: url('dream-animatic-shots/bg-no-glow.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .hidden {
      display: none;
    }

    #dreamContainer {
      position: relative;
      z-index: 1;
    }

    #glowBehindTitle {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1400px;
      height: 600px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0;
      z-index: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    #glowBehindTitle.glow {
      background: radial-gradient(
        circle,
        rgba(254, 57, 255, 0.25) 0%,
        rgba(254, 57, 255, 0.08) 50%,
        rgba(0, 0, 0, 0) 90%
      );
      opacity: 1;
    }

    #dreamImage {
      width: 540px;
      height: 207.5px;
      position: relative;
      z-index: 2;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    #dreamImage:hover {
      transform: scale(0.95);
    }

    /* 👇 video sits EXACTLY on top */
    #dreamVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 540px;
      height: 207.5px;
      display: none;
      pointer-events: none;
      z-index: 2;
    }

    #videoPlayer {
      position: absolute;
      width: 80vw;
      height: auto;
      border-radius: 15px;
      z-index: 10;
    }

    #spotlightOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 5;
      background: radial-gradient(
        circle at var(--x, 50%) var(--y, 50%),
        rgba(0, 0, 0, 0) 50px,
        rgba(0, 0, 0, 0.8) 150px
      );
      transition: background 0.3s ease;
    }
  </style>
</head>
<body>

  <div id="dreamContainer">
    <div id="glowBehindTitle"></div>

    <!-- ORIGINAL IMAGE -->
    <img
      id="dreamImage"
      src="dream-animatic-shots/dream-title.png"
      alt="Dream Title"
    />

    <!-- NEW WEBM -->
    <video id="dreamVideo" muted playsinline preload="auto">
      <source src="dream-animatic-shots/dream-title-glow-1.webm" type="video/webm">
    </video>
  </div>

  <div id="spotlightOverlay"></div>

  <video id="videoPlayer" class="hidden" playsinline></video>

  <script>
    const videoFilesOriginal = ["dream-1.mp4", "dream-2.mp4", "dream-3.mp4","dream-4-fixed.mp4","dream-5.mp4"];
    let videoFiles = [...videoFilesOriginal];
    let currentIndex = 0;

    const videoElement = document.getElementById("videoPlayer");
    const dreamImage = document.getElementById("dreamImage");
    const dreamVideo = document.getElementById("dreamVideo");
    const spotlight = document.getElementById("spotlightOverlay");
    const glowBehindTitle = document.getElementById("glowBehindTitle");
    const folderPath = "dream-animatic-shots/";

    // spotlight tracking
    document.addEventListener("mousemove", (e) => {
      spotlight.style.setProperty("--x", e.clientX + "px");
      spotlight.style.setProperty("--y", e.clientY + "px");
    });

    // ✅ HOVER START (play once)
    dreamImage.addEventListener("mouseenter", () => {
      spotlight.style.background = "rgba(0, 0, 0, 0)";
      glowBehindTitle.classList.add("glow");

      dreamImage.style.visibility = "hidden";
      dreamVideo.style.display = "block";

      dreamVideo.currentTime = 0;
      dreamVideo.play();
    });

    // ✅ when animation ends → reset
    dreamVideo.addEventListener("ended", () => {
      dreamVideo.style.display = "none";
      dreamImage.style.visibility = "visible";
      glowBehindTitle.classList.remove("glow");
    });

    // keep your mouse leave effect
    dreamImage.addEventListener("mouseleave", () => {
      spotlight.style.background = `
        radial-gradient(
          circle at var(--x, 50%) var(--y, 50%),
          rgba(0, 0, 0, 0) 50px,
          rgba(0, 0, 0, 0.8) 150px
        )
      `;
    });

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    shuffleArray(videoFiles);

    function playCurrentVideo() {
      if (currentIndex >= videoFiles.length) {
        shuffleArray(videoFiles);
        currentIndex = 0;
      }

      const videoPath = folderPath + videoFiles[currentIndex];
      videoElement.src = videoPath;
      videoElement.load();
      videoElement.play().catch(() => {});
    }

    dreamImage.addEventListener("click", () => {
      dreamImage.classList.add("hidden");
      glowBehindTitle.classList.add("hidden");
      dreamVideo.classList.add("hidden");

      videoElement.classList.remove("hidden");
      spotlight.classList.add("hidden");

      playCurrentVideo();

      videoElement.onended = () => {
        currentIndex++;
        playCurrentVideo();
      };

      videoElement.onerror = () => {
        currentIndex++;
        playCurrentVideo();
      };
    });
  </script>
</body>
</html>
