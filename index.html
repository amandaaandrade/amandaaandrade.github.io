<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dream</title>
  <link rel="icon" href="data:image/x-icon,;">

  <style>
    body {
      margin: 0;
      background: url('dream-animatic-shots/bg-no-glow.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .hidden {
      display: none;
    }

    /* ✅ stable centered container */
    #dreamContainer {
      position: relative;
      width: 540px;
      height: 207.5px;
      transform-origin: center;
      transition: transform 0.2s ease;
    }

    /* 🔥 WEBM glow layer */
    #glowVideo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: auto;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
    }

    #glowVideo.show {
      opacity: 1;
    }

    #glowBehindTitle {
      position: absolute;
      width: 1400px;
      height: 600px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255, 255, 255, 0.25) 0%,
        rgba(255, 255, 255, 0.08) 50%,
        rgba(0, 0, 0, 0) 90%
      );
      filter: blur(100px);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 0;
      pointer-events: none;
    }

    #glowBehindTitle.glow {
      background: radial-gradient(
        circle,
        rgba(254, 57, 255, 0.25) 0%,
        rgba(254, 57, 255, 0.08) 50%,
        rgba(0, 0, 0, 0) 90%
      );
      opacity: 1;
    }

    #dreamImage {
      position: absolute;
      width: 100%;
      height: auto;
      z-index: 3;
      cursor: pointer;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #videoPlayer {
      position: absolute;
      width: 80vw;
      height: auto;
      border-radius: 15px;
      z-index: 10;
    }

    #spotlightOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 5;
      background: radial-gradient(
        circle at var(--x, 50%) var(--y, 50%),
        rgba(0, 0, 0, 0) 50px,
        rgba(0, 0, 0, 0.8) 150px
      );
      transition: background 0.3s ease;
    }
  </style>
</head>

<body>

  <div id="dreamContainer">

    <!-- 🔥 WEBM -->
    <video id="glowVideo" muted playsinline preload="auto">
      <source src="dream-animatic-shots/glow-dream.webm" type="video/webm">
    </video>

    <div id="glowBehindTitle"></div>

    <img
      id="dreamImage"
      src="dream-animatic-shots/dream-title.png"
      alt="Dream Title"
    />
  </div>

  <div id="spotlightOverlay"></div>

  <video id="videoPlayer" class="hidden" playsinline></video>

  <script>
    const videoFilesOriginal = [
      "dream-1.mp4",
      "dream-2.mp4",
      "dream-3.mp4",
      "dream-4-fixed.mp4",
      "dream-5.mp4"
    ];

    let videoFiles = [...videoFilesOriginal];
    let currentIndex = 0;

    const videoElement = document.getElementById("videoPlayer");
    const dreamImage = document.getElementById("dreamImage");
    const dreamContainer = document.getElementById("dreamContainer");
    const spotlight = document.getElementById("spotlightOverlay");
    const glowBehindTitle = document.getElementById("glowBehindTitle");
    const glowVideo = document.getElementById("glowVideo");

    document.addEventListener("mousemove", (e) => {
      spotlight.style.setProperty("--x", e.clientX + "px");
      spotlight.style.setProperty("--y", e.clientY + "px");
    });

    /* 🔥 HOVER IN */
    dreamImage.addEventListener("mouseenter", () => {
      glowVideo.classList.add("show");
      glowVideo.currentTime = 0;
      glowVideo.play();

      dreamContainer.style.transform = "scale(0.95)";
      spotlight.style.background = "rgba(0, 0, 0, 0)";
      glowBehindTitle.classList.add("glow");
    });

    /* 🔥 HOVER OUT */
    dreamImage.addEventListener("mouseleave", () => {
      glowVideo.pause();
      glowVideo.classList.remove("show");

      dreamContainer.style.transform = "scale(1)";

      spotlight.style.background = `
        radial-gradient(
          circle at var(--x, 50%) var(--y, 50%),
          rgba(0, 0, 0, 0) 50px,
          rgba(0, 0, 0, 0.8) 150px
        )
      `;

      glowBehindTitle.classList.remove("glow");
    });

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    shuffleArray(videoFiles);

    function playCurrentVideo() {
      if (currentIndex >= videoFiles.length) {
        shuffleArray(videoFiles);
        currentIndex = 0;
      }

      const videoPath = "dream-animatic-shots/" + videoFiles[currentIndex];
      videoElement.src = videoPath;
      videoElement.load();
      videoElement.play().catch(err => console.error(err));
    }

    dreamImage.addEventListener("click", () => {
      dreamContainer.classList.add("hidden");
      videoElement.classList.remove("hidden");
      spotlight.classList.add("hidden");

      playCurrentVideo();

      videoElement.onended = () => {
        currentIndex++;
        playCurrentVideo();
      };

      videoElement.onerror = () => {
        currentIndex++;
        playCurrentVideo();
      };
    });
  </script>

</body>
</html>
