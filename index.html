<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dream</title>

<style>
body {
  margin: 0;
  background: url('dream-animatic-shots/bg-no-glow.png') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* centered container */
#dreamContainer {
  position: relative;
  width: 540px;
  height: 207.5px;
  transform-origin: center;
  transition: transform 0.2s ease;
}

/* PNG sequence overlay */
#glowCanvas {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  transform: translate(-50%, -50%);
  z-index: 2;
  pointer-events: none;
}

/* title image */
#dreamImage {
  position: absolute;
  width: 100%;
  height: auto;
  z-index: 3;
  cursor: pointer;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* centered video */
#videoPlayer {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70vw;
  max-width: 900px;
  height: auto;
  border-radius: 15px;
  z-index: 10;
}

/* spotlight */
#spotlightOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 5;
  background: radial-gradient(
    circle at var(--x, 50%) var(--y, 50%),
    rgba(0, 0, 0, 0) 50px,
    rgba(0, 0, 0, 0.8) 150px
  );
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div id="dreamContainer">
  <canvas id="glowCanvas" width="540" height="207.5"></canvas>

  <img
    id="dreamImage"
    src="dream-animatic-shots/dream-title.png"
    alt="Dream Title"
  />
</div>

<div id="spotlightOverlay"></div>
<video id="videoPlayer" class="hidden" playsinline></video>

<script>
document.addEventListener("DOMContentLoaded", () => {

  /* ================= VIDEO ================= */

  const videoFilesOriginal = [
    "dream-1.mp4",
    "dream-2.mp4",
    "dream-3.mp4",
    "dream-4-fixed.mp4",
    "dream-5.mp4"
  ];

  let videoFiles = [...videoFilesOriginal];
  let currentIndex = 0;

  const videoElement = document.getElementById("videoPlayer");
  const dreamImage = document.getElementById("dreamImage");
  const dreamContainer = document.getElementById("dreamContainer");
  const spotlight = document.getElementById("spotlightOverlay");

  /* ================= PNG SEQUENCE ================= */

  const canvas = document.getElementById("glowCanvas");
  const ctx = canvas.getContext("2d");

  const totalFrames = 48;
  const frameRate = 30;

  let frames = [];
  let currentFrame = 0;
  let playing = false;

  const sequencePath = "title-seq/";

  for (let i = 0; i < totalFrames; i++) {
    const img = new Image();
    img.src = `${sequencePath}dream-glow${String(i).padStart(2, '0')}.png`;
    img.onerror = () => console.warn("Missing:", img.src);
    frames.push(img);
  }

  function drawFrame(index) {
    const img = frames[index];
    if (!img || !img.complete) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  }

  function playSequence() {
    if (playing) return;

    playing = true;
    currentFrame = 0;

    let lastTime = 0;

    function animate(time) {
      if (!playing) return;

      if (time - lastTime > 1000 / frameRate) {
        drawFrame(currentFrame);
        currentFrame++;
        lastTime = time;
      }

      if (currentFrame < totalFrames) {
        requestAnimationFrame(animate);
      } else {
        playing = false;
      }
    }

    requestAnimationFrame(animate);
  }

  /* ================= INTERACTIONS ================= */

  document.addEventListener("mousemove", (e) => {
    spotlight.style.setProperty("--x", e.clientX + "px");
    spotlight.style.setProperty("--y", e.clientY + "px");
  });

  dreamImage.addEventListener("mouseenter", () => {
    playSequence();
    dreamContainer.style.transform = "scale(0.95)";
    spotlight.style.background = "rgba(0,0,0,0)";
  });

  dreamImage.addEventListener("mouseleave", () => {
    playing = false;
    dreamContainer.style.transform = "scale(1)";
    spotlight.style.background = `
      radial-gradient(
        circle at var(--x, 50%) var(--y, 50%),
        rgba(0,0,0,0) 50px,
        rgba(0,0,0,0.8) 150px
      )
    `;
  });

  /* ================= VIDEO LOGIC ================= */

  function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  shuffleArray(videoFiles);

  function playCurrentVideo() {
    if (currentIndex >= videoFiles.length) {
      shuffleArray(videoFiles);
      currentIndex = 0;
    }

    const videoPath = "dream-animatic-shots/" + videoFiles[currentIndex];
    videoElement.src = videoPath;
    videoElement.load();
    videoElement.play().catch(err => console.error(err));
  }

  dreamImage.addEventListener("click", () => {
    dreamContainer.classList.add("hidden");
    videoElement.classList.remove("hidden");
    spotlight.classList.add("hidden");

    playCurrentVideo();

    videoElement.onended = () => {
      currentIndex++;
      playCurrentVideo();
    };

    videoElement.onerror = () => {
      currentIndex++;
      playCurrentVideo();
    };
  });

});
</script>

</body>
</html>
