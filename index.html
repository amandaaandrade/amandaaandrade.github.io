<script>
  const canvas = document.getElementById("glowCanvas");
  const ctx = canvas.getContext("2d");

  const dreamImage = document.getElementById("dreamImage");
  const dreamContainer = document.getElementById("dreamContainer");
  const spotlight = document.getElementById("spotlightOverlay");

  const totalFrames = 48;
  const frameRate = 30;

  let frames = [];
  let loadedCount = 0;
  let currentFrame = 0;
  let playing = false;

  /* ✅ FIXED PATH */
  const path = "title-seq/";

  /* 🔥 PRELOAD */
  for (let i = 0; i < totalFrames; i++) {
    const img = new Image();

    img.src = `${path}dream-glow${String(i).padStart(2, '0')}.png?v=2`;

    img.onload = () => loadedCount++;
    img.onerror = () => console.warn("Missing:", img.src);

    frames.push(img);
  }

  function drawFrame(index) {
    const img = frames[index];

    if (!img || !img.complete || img.naturalWidth === 0) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
  }

  function playSequence() {
    if (playing) return;

    playing = true;
    currentFrame = 0;

    canvas.classList.add("show");

    let lastTime = 0;

    function animate(time) {
      if (!playing) return;

      if (time - lastTime >= 1000 / frameRate) {
        drawFrame(currentFrame);
        currentFrame++;
        lastTime = time;
      }

      if (currentFrame < totalFrames) {
        requestAnimationFrame(animate);
      } else {
        playing = false;
      }
    }

    requestAnimationFrame(animate);
  }

  dreamImage.addEventListener("mouseenter", () => {
    playSequence();

    dreamContainer.style.transform = "scale(0.95)";
    spotlight.style.background = "rgba(0, 0, 0, 0)";
  });

  dreamImage.addEventListener("mouseleave", () => {
    playing = false;
    canvas.classList.remove("show");

    dreamContainer.style.transform = "scale(1)";

    spotlight.style.background = `
      radial-gradient(
        circle at var(--x, 50%) var(--y, 50%),
        rgba(0, 0, 0, 0) 50px,
        rgba(0, 0, 0, 0.8) 150px
      )
    `;
  });

  document.addEventListener("mousemove", (e) => {
    spotlight.style.setProperty("--x", e.clientX + "px");
    spotlight.style.setProperty("--y", e.clientY + "px");
  });
</script>
